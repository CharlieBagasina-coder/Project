<!DOCTYPE html>
<html>

<head>
    <title>My Webpage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            font-family: verdana;
        }

        h1 {
            color: white;
            font-size: 35px;
            text-align: center;
            border-radius: 10px;
            padding: 20px 10px;
            margin-left: 220px;
            margin-right: 20px;
            margin-top: 20px;
            margin-bottom: 20px;
            background-color: #bb9a8b;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 16px;
            font-family: verdana;
            text-align: left;
            margin-left: 220px;
            margin-right: 20px;
            margin-top: 10px;
            margin-bottom: 20px;
            background-color: rgba(242, 242, 242, 0.351);
            color: rgb(168, 85, 85);
            padding: 25px;
            line-height: 1.8;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            width: 200px;
            background-color: rgb(177, 131, 88);
            border-radius: 10px;
            height: 100%;
            position: fixed;
            overflow: auto;
            top: 0;
            left: 0;
        }

        li a {
            display: block;
            color: white;
            padding: 15px 16px;
            text-decoration: none;
            transition: 0.3s ease;
            font-weight: bold;
            border-left: 4px solid transparent;
        }

        li a:hover {
            background-color: #66441b;
            padding-left: 20px;
            border-left: 4px solid white;
        }

        li a:active {
            background-color: #5a3a14;
        }
    </style>
</head>

<body>
    <ul>
        <li><a href="Home.html">Home</a></li>
        <li><a href="Profile.html">Profile</a></li>
        <li><a href="Contact.html">Contact/Social Media</a></li>
        <li><a href="AboutMe.html">About Me</a></li>
    </ul>

    <h1>Welcome to my First Webpage</h1>
    <p>This is my First Web Assignment. I am learning HTML and CSS to create websites.</p>
</body>

</html>
